<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Diet Tracks</title>
    <link rel="icon" type="image/png" href="/assets/diet-tracks-logo.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div class="app-title-row">
          <img class="app-logo" src="/assets/diet-tracks-logo.png" alt="Diet Tracks" />
        </div>
        <div class="header-actions">
          <a id="sheet-link" class="ghost-button" href="#" target="_blank" rel="noreferrer">Open Sheet</a>
          <button id="logout-button" class="icon-button" type="button" aria-label="Lock">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 10V8a5 5 0 0 1 10 0v2" />
              <rect x="5" y="10" width="14" height="10" rx="2" />
              <path d="M12 14v2" />
            </svg>
          </button>
        </div>
      </header>

      <section class="composer-panel" aria-labelledby="composer-title">
        <div class="composer-grid">
          <label class="date-field">
            <span>Day</span>
            <div class="date-row">
              <input id="date-input" type="date" />
              <strong id="selected-date-label" class="selected-date-label"></strong>
            </div>
          </label>

          <div class="status-strip" id="status-strip">
            <span id="agent-status">Agent</span>
            <span id="sheet-status">Sheet</span>
          </div>
        </div>

        <div id="chat-log" class="chat-log" aria-live="polite"></div>

        <label class="transcript-field" for="chat-input">
          <span id="composer-title">Message to Agent</span>
          <textarea id="chat-input" rows="2" placeholder="Tell me about your diet today"></textarea>
        </label>

        <div class="action-row">
          <button id="mic-button" class="secondary-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Z" />
              <path d="M19 11a7 7 0 0 1-14 0" />
              <path d="M12 18v3" />
              <path d="M8 21h8" />
            </svg>
            <span id="mic-label">Dictate</span>
          </button>
          <button id="send-button" class="primary-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M22 2 11 13" />
              <path d="M22 2 15 22 11 13 2 9 22 2Z" />
            </svg>
            <span>Send to Agent</span>
          </button>
        </div>

        <p id="message" class="message" role="status" aria-live="polite"></p>
      </section>

      <section class="results-panel" aria-labelledby="draft-title">
        <div class="section-heading">
          <div class="section-title">
            <h2 id="draft-title">Proposed Submission</h2>
            <span id="proposed-row-count">0 rows</span>
          </div>
          <button id="approve-button" class="primary-button" type="button" disabled>Save to Google Sheet</button>
        </div>
        <div id="draft-summary" class="summary-grid"></div>
        <div class="table-wrap">
          <table id="proposed-table">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
